chocolateys:
  # NOTE: the bare name "lore" is already taken on community.chocolatey.org
  # (version 0.1.1 by a third party). We publish as "lore-cli" instead.
  - name: lore-cli
    title: "Lore CLI"
    authors: "Museigen"
    project_url: "https://github.com/GreyCoderK/lore"
    license_url: "https://github.com/GreyCoderK/lore/blob/main/LICENSE"
    description: "A CLI tool that captures the why behind your code, one commit at a time"
    tags: "documentation cli git developer-tools"
    api_key: "{{ .Env.CHOCOLATEY_API_KEY }}"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

checksum:
  name_template: "checksums.txt"

release:
  footer: >-

    ---

    **Install:**
    ```
    # Homebrew (macOS / Linux)
    brew install GreyCoderK/tap/lore

    # Script (Linux / macOS)
    curl -sSfL https://raw.githubusercontent.com/GreyCoderK/lore/main/install.sh | sh

    # Debian / Ubuntu
    sudo dpkg -i lore_*.deb

    # Fedora / RHEL
    sudo rpm -i lore_*.rpm

    # Chocolatey (Windows)
    choco install lore-cli

    # Go
    go install github.com/greycoderk/lore@{{ .Tag }}
    ```

    Released by [GoReleaser](https://github.com/goreleaser/goreleaser).

# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        formats: [zip]

brews:
  - repository:
      owner: GreyCoderK
      name: homebrew-lore
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/GreyCoderK/lore"
    description: "A CLI tool that captures the why behind your code, one commit at a time"
    license: "AGPL-3.0-or-later"
    install: |
      bin.install "lore"
    test: |
      system "#{bin}/lore", "--help"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  footer: >-

    ---

    **Install:**
    ```
    # Homebrew (macOS / Linux)
    brew install GreyCoderK/lore/lore

    # Go
    go install github.com/greycoderk/lore@{{ .Tag }}
    ```

    Released by [GoReleaser](https://github.com/goreleaser/goreleaser).

# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/greycoderk/lore/internal/version.Version={{.Version}}
      - -X github.com/greycoderk/lore/internal/version.Commit={{.ShortCommit}}
      - -X github.com/greycoderk/lore/internal/version.Date={{.Date}}

archives:
  - formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        formats: [zip]

brews:
  - repository:
      owner: GreyCoderK
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/GreyCoderK/lore"
    description: "A CLI tool that captures the why behind your code, one commit at a time"
    license: "AGPL-3.0-or-later"
    install: |
      bin.install "lore"
    test: |
      system "#{bin}/lore", "--help"

nfpms:
  - package_name: lore
    homepage: "https://github.com/GreyCoderK/lore"
    maintainer: "Museigen <museigen@greycoderk.com>"
    description: "A CLI tool that captures the why behind your code, one commit at a time"
    license: "AGPL-3.0-or-later"
    section: utils
    bindir: /usr/bin
    formats:
      - deb
      - rpm
      - apk


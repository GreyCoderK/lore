# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        formats: [zip]

brews:
  - repository:
      owner: GreyCoderK
      name: homebrew-lore
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/GreyCoderK/lore"
    description: "A CLI tool that captures the why behind your code, one commit at a time"
    license: "MIT"
    install: |
      bin.install "lore"
    test: |
      system "#{bin}/lore", "--help"

snaps:
  - name: lore
    summary: A CLI tool that captures the why behind your code
    description: |
      Lore hooks into your Git workflow to document decisions, trade-offs,
      and context that code alone can't convey. Every commit becomes an
      opportunity to build a searchable knowledge base.
    grade: stable
    confinement: classic
    license: MIT
    publish: true

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  footer: >-

    ---

    **Install:**
    ```
    # Homebrew
    brew install GreyCoderK/lore/lore

    # Snap
    sudo snap install lore --classic

    # Go
    go install github.com/greycoderk/lore@{{ .Tag }}
    ```

    Released by [GoReleaser](https://github.com/goreleaser/goreleaser).

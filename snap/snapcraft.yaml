name: lore
base: core24
version: '0.1.0'
summary: A CLI tool that captures the why behind your code
description: |
  Lore hooks into your Git workflow to document decisions, trade-offs,
  and context that code alone can't convey. Every commit becomes an
  opportunity to build a searchable knowledge base — no wiki, no
  Confluence, just Markdown files living next to your code.

  Your code knows what. Lore knows why.

grade: stable
confinement: classic
license: MIT

architectures:
  - build-on: [amd64]
  - build-on: [arm64]

parts:
  lore:
    plugin: go
    source: .
    build-snaps:
      - go/latest/stable

apps:
  lore:
    command: bin/lore

version: "2"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
  exclusions:
    rules:
      - path: "_test\\.go"
        linters:
          - errcheck
  settings:
    errcheck:
      exclude-functions:
        - "fmt.Fprint"
        - "fmt.Fprintf"
        - "fmt.Fprintln"
        - "(io.Writer).Write"
        - "os.WriteFile"

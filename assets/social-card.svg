    <linearGradient id="scBark" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#374151"/>
      <stop offset="60%" stop-color="#6B7280"/>
      <stop offset="100%" stop-color="#9CA3AF"/>
    </linearGradient>
    <filter id="scLeafGlow" x="-100%" y="-100%" width="300%" height="300%">

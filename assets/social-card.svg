  <!-- Terminal content -->
  <text x="710" y="415" font-family="'Menlo', 'Courier New', monospace" font-size="17" fill="#D97706">$ git commit -m "feat: add JWT auth"</text>
  <text x="710" y="445" font-family="'Menlo', 'Courier New', monospace" font-size="16" fill="#9CA3AF">  [1/3] Type [feature]:</text>
  <text x="710" y="470" font-family="'Menlo', 'Courier New', monospace" font-size="16" fill="#9CA3AF">  [2/3] What [add JWT auth]:</text>
  <text x="710" y="495" font-family="'Menlo', 'Courier New', monospace" font-size="16" fill="#9CA3AF">  [3/3] Why?</text>
  <text x="710" y="520" font-family="'Menlo', 'Courier New', monospace" font-size="16" fill="#e5e7eb">  Stateless auth scales better</text>
  <text x="710" y="548" font-family="'Menlo', 'Courier New', monospace" font-size="16" fill="#FBBF24">  Captured  decision-jwt-auth.md</text>
</svg>
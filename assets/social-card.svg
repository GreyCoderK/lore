<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <style>
      .bg { fill: #1a1a1a; }
      .title { fill: #ffffff; font-family: 'Georgia', serif; font-size: 72px; font-weight: bold; }
      .tagline { fill: #aaaaaa; font-family: 'Helvetica Neue', sans-serif; font-size: 28px; }
      .terminal { fill: #222222; rx: 12; }
      .prompt { fill: #55cc22; font-family: 'Menlo', 'Courier New', monospace; font-size: 20px; }
      .output { fill: #cccccc; font-family: 'Menlo', 'Courier New', monospace; font-size: 18px; }
      .accent { fill: #55cc22; }
      .glyph { fill: #55cc22; font-family: 'Georgia', serif; font-size: 120px; font-weight: bold; }
    </style>
  </defs>

  <!-- Background -->
  <rect class="bg" width="1280" height="640"/>

  <!-- Logo glyph -->
  <text class="glyph" x="100" y="160">?</text>

  <!-- Title -->
  <text class="title" x="200" y="145">Lore</text>

  <!-- Tagline -->
  <text class="tagline" x="100" y="210">Your code knows what. Lore knows why.</text>

  <!-- Terminal window -->
  <rect class="terminal" x="80" y="260" width="1120" height="320" rx="12"/>

  <!-- Terminal dots -->
  <circle cx="110" cy="285" r="6" fill="#ff5f57"/>
  <circle cx="130" cy="285" r="6" fill="#febc2e"/>
  <circle cx="150" cy="285" r="6" fill="#28c840"/>

  <!-- Terminal content -->
  <text class="prompt" x="110" y="330">$ lore show</text>
  <text class="output" x="110" y="365">---</text>
  <text class="output" x="110" y="390">type: refactor</text>
  <text class="output" x="110" y="415">date: 2026-03-15</text>
  <text class="output" x="110" y="440">commit: a1b2c3d</text>
  <text class="output" x="110" y="465">---</text>
  <text class="accent" x="110" y="500"># Extract auth middleware into dedicated package</text>
  <text class="output" x="110" y="530">## Why</text>
  <text class="output" x="110" y="555">The auth logic was scattered across 4 handlers, making</text>
  <text class="output" x="110" y="575">it impossible to test token refresh independently.</text>
</svg>

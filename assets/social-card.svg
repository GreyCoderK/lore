  <!-- ===== Text content (right side) ===== -->
  <!-- Title -->
  <text x="700" y="200" font-family="'Palatino Linotype', Palatino, Georgia, serif" font-size="96" font-weight="bold" fill="#e5e7eb">Lore</text>

  <!-- Tagline -->
  <text x="700" y="265" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="30" fill="#9CA3AF" font-weight="300">Your code knows what. Lore knows why.</text>

  <!-- French tagline -->
  <text x="700" y="310" font-family="'Palatino Linotype', Georgia, serif" font-size="22" fill="#D97706" font-style="italic" opacity="0.7">L'or de vos decisions techniques.</text>

  <!-- Terminal snippet -->
  <rect x="680" y="350" width="540" height="220" fill="#1a1f28" rx="12"/>
  <!-- Terminal dots -->

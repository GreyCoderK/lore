name: Release
on:
  push:
    tags: ["v*"]
permissions:
  contents: write
jobs:
  verify-chocolatey:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: Build snapshot (no publish)
        uses: goreleaser/goreleaser-action@v7
        with:
          args: release --snapshot --clean --skip=publish
      - name: Verify .nupkg artifact is present and well-formed
        shell: pwsh
        # NOTE: we intentionally do NOT run `choco install` here. The
        # chocolateyInstall.ps1 generated by goreleaser downloads the
        # Windows binary from https://github.com/.../releases/download/
        # <tag>/..., which does not exist yet during pre-release
        # validation (the real release job runs *after* this one). A
        # `choco install` pre-release always 404s. The real install
        # path is exercised after the release publishes via goreleaser's
        # chocolatey push; this gate only confirms the pipeline can
        # produce a valid-looking nupkg.
        run: |
          $nupkg = Get-ChildItem dist -Recurse -Filter "lore-cli.*.nupkg" | Select-Object -First 1
          if (-not $nupkg) { throw "No .nupkg found in dist/" }
          Write-Host "Found nupkg: $($nupkg.FullName) ($($nupkg.Length) bytes)"
          # Sanity: the nupkg is a zip; try to open it and verify the .nuspec is parseable.
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $zip = [System.IO.Compression.ZipFile]::OpenRead($nupkg.FullName)
          try {
            $nuspec = $zip.Entries | Where-Object { $_.FullName -like "*.nuspec" } | Select-Object -First 1
            if (-not $nuspec) { throw "nupkg missing .nuspec metadata" }
            $reader = New-Object System.IO.StreamReader($nuspec.Open())
            try {
              [xml]$xml = $reader.ReadToEnd()
            } finally {
              $reader.Dispose()
            }
            $id = $xml.package.metadata.id
            $version = $xml.package.metadata.version
            if ($id -ne "lore-cli") { throw "nuspec id = '$id' (expected lore-cli)" }
            if (-not $version) { throw "nuspec version is empty" }
            Write-Host "nupkg OK — id=$id version=$version"
          } finally {
            $zip.Dispose()
          }

  release:
    needs: verify-chocolatey
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: Run tests before release
        run: go test ./...
      - uses: goreleaser/goreleaser-action@v7
        with:
          # NOTE: --skip=chocolatey until the first lore-cli submission clears
          # manual moderation on community.chocolatey.org. Until then, any
          # push returns 403 Forbidden and fails the whole release workflow
          # even though GitHub, Homebrew, Linux packages, etc. all published
          # successfully. Re-enable by removing --skip=chocolatey once the
          # initial moderation is approved (typically 1–7 days). Users can
          # still download binaries from GitHub Releases in the meantime.
          args: release --clean --skip=chocolatey
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
          CHOCOLATEY_API_KEY: ${{ secrets.CHOCOLATEY_API_KEY }}

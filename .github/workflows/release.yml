name: Release
on:
  push:
    tags: ["v*"]
permissions:
  contents: write
jobs:
  verify-chocolatey:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: Build snapshot (no publish)
        uses: goreleaser/goreleaser-action@v7
        with:
          args: release --snapshot --clean --skip=publish
      - name: Install .nupkg locally
        shell: pwsh
        run: |
          $nupkg = Get-ChildItem dist -Recurse -Filter "lore-cli.*.nupkg" | Select-Object -First 1
          if (-not $nupkg) { throw "No .nupkg found in dist/" }
          # --pre accepts the snapshot version (e.g. 1.2.0-SNAPSHOT-abc) produced by `release --snapshot`.
          choco install lore-cli -y -s "$($nupkg.Directory.FullName)" --no-progress --pre
      - name: Verify binary works
        shell: pwsh
        run: |
          lore --version
          lore --help

  release:
    needs: verify-chocolatey
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: Run tests before release
        run: go test ./...
      - uses: goreleaser/goreleaser-action@v7
        with:
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
          CHOCOLATEY_API_KEY: ${{ secrets.CHOCOLATEY_API_KEY }}

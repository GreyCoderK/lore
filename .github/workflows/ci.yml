name: CI
on: [push, pull_request]
jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: Run tests with coverage
        if: matrix.os == 'ubuntu-latest'
        run: go test -coverprofile coverage.out -covermode=atomic ./...
      - name: Run tests
        if: matrix.os != 'ubuntu-latest'
        run: go test ./...
      - name: Upload coverage reports to Codecov
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.out
          fail_ci_if_error: false
        
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - uses: golangci/golangci-lint-action@v8
        with:
          version: v2.11.3
      - name: License check
        run: |
          go install github.com/google/go-licenses@latest
          go-licenses check ./... --allowed_licenses=Apache-2.0,BSD-2-Clause,BSD-3-Clause,MIT,ISC,AGPL-3.0 --ignore=modernc.org/mathutil
      - name: GoReleaser check
        uses: goreleaser/goreleaser-action@v6
        with:
          args: check

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: stable

      # Build lore from source (we're in our own repo)
      - name: Build lore
        run: go build -o lore .

      # Angela Draft — offline quality gate on our own docs
      - name: Angela Draft (docs site)
        run: |
          ./lore angela draft --all --path ./docs

      # Angela Draft — also check example docs
      - name: Angela Draft (examples)
        run: |
          ./lore angela draft --all --path ./examples/demo-repo/.lore/docs

      # Angela Review — AI corpus coherence check (only on main, requires API key)
      - name: Angela Review (docs site)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          LORE_AI_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LORE_AI_PROVIDER: anthropic
          LORE_AI_MODEL: claude-sonnet-4-20250514
          LORE_AI_TIMEOUT: 240s
          LORE_ANGELA_MAX_TOKENS: 38192
        run: |
          if [ -n "$LORE_AI_API_KEY" ]; then
            ./lore angela review --path ./docs --all
          else
            echo "Skipping review: no API key configured"
          fi

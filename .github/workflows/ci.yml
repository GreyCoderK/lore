name: CI
on: [push, pull_request]
jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: Run tests with coverage
        if: matrix.os == 'ubuntu-latest'
        run: go test -coverprofile coverage.out -covermode=atomic ./...
      - name: Run tests
        if: matrix.os != 'ubuntu-latest'
        run: go test ./...
      - name: Upload coverage reports to Codecov
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.out
          fail_ci_if_error: false
        
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - uses: golangci/golangci-lint-action@v8
        with:
          version: v2.11.3
      - name: License check
        run: |
          go install github.com/google/go-licenses@latest
          go-licenses check ./... --allowed_licenses=Apache-2.0,BSD-2-Clause,BSD-3-Clause,MIT,ISC,AGPL-3.0 --ignore=modernc.org/mathutil
      - name: GoReleaser check
        uses: goreleaser/goreleaser-action@v6
        with:
          args: check

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2

      # Detect if docs or code changed (skip everything if neither)
      - name: Check for changes
        id: changes
        run: |
          DOCS_CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'docs/**' 'examples/**' '*.md' | head -1)
          CODE_CHANGED=$(git diff --name-only HEAD~1 HEAD -- '*.go' 'internal/**' 'cmd/**' | head -1)
          if [ -n "$DOCS_CHANGED" ]; then
            echo "docs=true" >> "$GITHUB_OUTPUT"
          else
            echo "docs=false" >> "$GITHUB_OUTPUT"
          fi
          if [ -n "$CODE_CHANGED" ]; then
            echo "code=true" >> "$GITHUB_OUTPUT"
          else
            echo "code=false" >> "$GITHUB_OUTPUT"
          fi
          echo "docs_changed=$DOCS_CHANGED code_changed=$CODE_CHANGED"

      - uses: actions/setup-go@v6
        if: steps.changes.outputs.docs == 'true' || steps.changes.outputs.code == 'true'
        with:
          go-version: stable

      # Build lore from source (we're in our own repo)
      - name: Build lore
        if: steps.changes.outputs.docs == 'true' || steps.changes.outputs.code == 'true'
        run: go build -o lore .

      # Angela Draft — offline quality gate on our own docs
      - name: Angela Draft (docs site)
        if: steps.changes.outputs.docs == 'true' || steps.changes.outputs.code == 'true'
        run: |
          ./lore angela draft --all --path ./docs

      # Angela Draft — also check example docs
      - name: Angela Draft (examples)
        if: steps.changes.outputs.docs == 'true'
        run: |
          ./lore angela draft --all --path ./examples/demo-repo/.lore/docs

      # Angela Review — AI corpus coherence check (only on main + docs changed)
      - name: Angela Review (docs site)
        if: >-
          github.ref == 'refs/heads/main'
          && github.event_name == 'push'
          && steps.changes.outputs.docs == 'true'
        env:
          LORE_AI_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LORE_AI_PROVIDER: anthropic
          LORE_AI_MODEL: claude-sonnet-4-20250514
          LORE_AI_TIMEOUT: 120s
          LORE_ANGELA_MAX_TOKENS: 18192
        run: |
          if [ -n "$LORE_AI_API_KEY" ]; then
            ./lore angela review --path ./docs --all
          else
            echo "Skipping review: no API key configured"
          fi

      - name: Skip notice
        if: steps.changes.outputs.docs == 'false' && steps.changes.outputs.code == 'false'
        run: echo "No docs or code changes — skipping Angela analysis"
